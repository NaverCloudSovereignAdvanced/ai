services:
  ai-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATA_DIR: /app/data
      DATABASE_URL: sqlite:////app/data/app.db
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      NAVER_CLOVA_OCR_INVOKE_URL: ${NAVER_CLOVA_OCR_INVOKE_URL:-}
      NAVER_CLOVA_OCR_SECRET_KEY: ${NAVER_CLOVA_OCR_SECRET_KEY:-}
    volumes:
      - ai_server_data:/app/data

volumes:
  ai_server_data:
